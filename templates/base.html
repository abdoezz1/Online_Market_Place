<link rel="icon" type="image/x-icon" href="/static/images/website_icon.ico">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALES Square</title>
    <link rel="stylesheet" href="/static/css/custom-bootstrap-alerts.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary:        #6C63FF;   /* vibrant indigo-violet */
            --primary-dark:   #574FD6;
            --primary-light:  #EEF0FF;
            --accent:         #FF6584;   /* coral-pink accent */
            --accent-dark:    #E84E6A;
            --success:        #43C59E;
            --warning:        #F9A826;
            --danger:         #FF6B6B;
            --bg:             #F4F5FB;
            --surface:        #FFFFFF;
            --text:           #1E1E2E;
            --text-muted:     #6B6B80;
            --border:         #E2E4F0;
            --shadow-sm:      0 2px 8px rgba(108,99,255,.08);
            --shadow-md:      0 6px 20px rgba(108,99,255,.14);
            --shadow-lg:      0 10px 30px rgba(108,99,255,.18);
            --radius:         12px;
            --radius-lg:      18px;
            --transition:     all 0.28s cubic-bezier(.4,0,.2,1);
        }

        html, body {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            background-color: var(--bg);
        }
        main { flex: 1; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

        /* Utility overrides */
        a { color: var(--primary); }
        a:hover { color: var(--primary-dark); }

        .btn-primary, button.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }

        /* Alert fade-out */
        .alert { border-radius: var(--radius); }
        .fade-out { opacity: 0; transition: opacity 0.5s ease; }
    </style>
</head>
<body>
    {% block navbar %}
        {% include 'parts/navbar.html' %}
    {% endblock %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'parts/footer.html' %}

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.alert').forEach(function (msg) {
            setTimeout(function () {
                msg.classList.add('fade-out');
                setTimeout(function () { msg.remove(); }, 500);
            }, 5000);
        });
    });
    </script>
</body>
</html>
