<link rel="icon" type="image/x-icon" href="/static/images/website_icon.ico">
<head></head>
    <title>SALES Square - Login</title>
</head>
{% block extra_css %}
<link rel="stylesheet" href="/static/css/login.css">
{% endblock %}
{% block content %}
<main class="signup-wrapper">
    <div class="signup-container">
        <h1>Welcome Back</h1>
        {% if error %}
        <div id="message" style="color:#721c24;background:#f8d7da;padding:10px;margin:10px 0;border-radius:5px;">
            {{ error }}
        </div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="identifier">Username or Email</label>
                <input id="identifier" name="identifier" type="text" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>
            <button type="submit" class="signup-btn">Login</button>
        </form>
        <div class="signup-footer">
            <p>Don't have an account? <a href="/signup">Create one here</a></p>
        </div>
    </div>
</main>
{% endblock %}
