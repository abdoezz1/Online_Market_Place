<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - Marketplace_server</title>

    <link rel="icon" type="image/x-icon" href="/static/images/website_icon.ico">
    <link rel="stylesheet" href="/static/css/login.css">
</head>

<body>

<main class="signup-wrapper">
    <div class="signup-container">
        <h1>Welcome Back</h1>

        <div id="message" style="display: none;"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>

            <button type="submit" class="signup-btn">Login</button>
        </form>

        <div class="signup-footer">
            <p>
                Don't have an account?
                <a href="/signup">Create one here</a>
            </p>
        </div>
    </div>
</main>

<script>
    document.getElementById("login-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const response = await fetch("/api/login/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "same-origin",
            body: JSON.stringify({ username, password }),
        });

        const messageBox = document.getElementById("message");

        if (response.ok) {
            window.location.href = "/home/";
        } else {
            messageBox.style.display = "block";
            messageBox.innerHTML = "Login failed. Check your credentials.";
            messageBox.style.color = "#721c24";
            messageBox.style.backgroundColor = "#f8d7da";
            messageBox.style.padding = "10px";
            messageBox.style.margin = "10px 0";
            messageBox.style.borderRadius = "5px";
        }
    });
</script>

</body>
</html>
